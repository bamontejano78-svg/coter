# ═══════════════════════════════════════════════════════════════
# Nginx Init Config — Coter Pro
# Solo HTTP. Se usa ÚNICAMENTE para obtener el certificado inicial.
# Después se reemplaza por nginx.conf (el de producción con HTTPS).
# ═══════════════════════════════════════════════════════════════

server {
    listen 80;
    listen [::]:80;
    server_name coter.app app.coter.app;

    # Let's Encrypt ACME challenge (necesario para obtener el cert)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Todo lo demás → proxy a la API
    location / {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering off;
    }
}
