# ═══════════════════════════════════════════════════════════════
# Nginx Staging Config — Coter Pro
# SSL self-signed para pruebas locales
# ═══════════════════════════════════════════════════════════════

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name localhost app.localhost;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name localhost app.localhost;

    # SSL self-signed para staging
    ssl_certificate     /etc/nginx/certs/staging.crt;
    ssl_certificate_key /etc/nginx/certs/staging.key;

    # Seguridad SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json text/html;
    gzip_min_length 256;
    gzip_vary on;

    # Client max body size (para uploads)
    client_max_body_size 10m;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # API proxy
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering off;

        # Rate limiting general para API
        limit_req zone=api burst=20 nodelay;
        limit_req_status 429;

        # Rate limiting más estricto para auth
        location /api/v1/therapists/login {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://api:3000;
        }
        location /api/v1/therapists/register {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://api:3000;
        }
    }

    # Static files (served by API container via proxy)
    # Nginx proxies all requests to the API, which serves static files
    # via express.static. For production, consider serving static files
    # directly from nginx using a shared volume.

    # Frontend + API — todas las peticiones van al backend
    location / {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering off;
    }
}
